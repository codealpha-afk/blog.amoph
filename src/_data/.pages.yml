media:
  input: src/images/blog
  output: /images/blog

content:
  # ── Blog Posts ────────────────────────────────────────────
  - name: posts
    label: Blog Posts
    type: collection
    path: src/posts
    filename: "{fields.slug}.md"
    view:
      fields: [title, date, category]
    fields:
      - name: title
        label: Title
        type: string
      - name: slug
        label: "URL Slug (e.g. why-initiation-matters)"
        type: string
      - name: date
        label: Date
        type: date
      - name: category
        label: Category
        type: select
        options:
          values:
            - Doctrine
            - Initiation
            - History
            - Practice
            - Philippines
            - Western Esotericism
      - name: description
        label: Meta Description
        type: string
      - name: excerpt
        label: Excerpt (shown on blog listing)
        type: string
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: tags
        label: Tags
        type: string
        hidden: true
        default: posts
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: layouts/post.njk
      - name: body
        label: Content
        type: rich-text

  # ── Site Settings ─────────────────────────────────────────
  - name: settings
    label: Site Settings
    type: file
    path: src/_data/settings.json
    fields:
      - name: name
        label: Site Name
        type: string
      - name: description
        label: Site Description
        type: string
      - name: url
        label: Site URL
        type: string
      - name: social
        label: Social Links
        type: object
        fields:
          - name: twitter
            label: Twitter / X URL
            type: string
            required: false
          - name: facebook
            label: Facebook URL
            type: string
            required: false
          - name: instagram
            label: Instagram URL
            type: string
            required: false
          - name: youtube
            label: YouTube URL
            type: string
            required: false

  # ── Homepage ──────────────────────────────────────────────
  - name: homepage
    label: Homepage
    type: file
    path: src/_data/homepage.json
    fields:
      - name: hero_title
        label: Hero Title
        type: string
      - name: hero_tagline
        label: Hero Tagline
        type: string
      - name: hero_button_text
        label: Hero Button Text
        type: string
      - name: hero_button_url
        label: Hero Button URL
        type: string
      - name: featured_section_title
        label: Featured Section Title
        type: string
      - name: about_blurb
        label: About Blurb
        type: text

  # ── Navigation ────────────────────────────────────────────
  - name: navigation
    label: Navigation
    type: file
    path: src/_data/navigation.json
    fields:
      - name: items
        label: Menu Items
        type: array
        fields:
          - name: label
            label: Label
            type: string
          - name: url
            label: URL
            type: string
